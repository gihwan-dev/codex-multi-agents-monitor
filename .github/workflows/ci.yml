name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable pnpm

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pnpm install --frozen-lockfile
      - run: python -m pip install lizard==1.21.2
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm storybook:build
      - run: pnpm build

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jscpd-report
          path: .tmp-quality/jscpd/
          if-no-files-found: ignore
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable pnpm

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --all-targets --all-features

      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

      - name: Install rust-code-analysis CLI
        continue-on-error: true
        run: cargo install rust-code-analysis-cli --version 0.0.25 --locked

      - name: Export rust-code-analysis metrics
        continue-on-error: true
        working-directory: src-tauri
        run: |
          mkdir -p ../.tmp-quality/rust-code-analysis
          if command -v rust-code-analysis-cli >/dev/null 2>&1; then
            rust-code-analysis-cli -m -p src -O json -o ../.tmp-quality/rust-code-analysis/metrics.json
          else
            printf '{"status":"rust-code-analysis-cli unavailable"}\n' > ../.tmp-quality/rust-code-analysis/metrics.json
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-code-analysis
          path: .tmp-quality/rust-code-analysis/
          if-no-files-found: ignore
          retention-days: 7
