task: run-workbench-ui-redesign
goal: Redesign the current monitor UI into a workspace-grouped observability workbench with a readable row-based event graph and a causal inspector.
success_criteria:
  - A user can find the target run from a workspace-grouped tree with quick filters in under 10 seconds.
  - A user can explain the selected run's current blocker, last handoff, first failure, and final artifact within 30 seconds from the compact strip, primary graph, and inspector without opening raw payload.
  - Selecting a row, edge, or anomaly jump highlights the same causal path in the graph and the inspector with clear cause and impact context.
  - Summary, anomaly jumps, filters, and the bottom drawer stay compact or hidden by default so the graph remains the primary surface at 1280px desktop width.
major_boundaries:
  - Left rail workspace tree, quick filters, and dense run row navigation
  - Main workbench chrome, compact summary strip, and unified graph toolbar
  - Row-based event graph, time gutter, selected-path emphasis, and gap folding/degradation rules
  - Inspector cause and impact presentation, drawer reveal policy, and selection sync across panes
  - UI state and selector refactor boundaries across app shell, run-list, graph, inspector, and shared primitives
work_type: refactor
impact_flags:
  - ui_surface_changed
  - workflow_changed
  - architecture_significant
  - high_user_risk
