  - ADRs/ADR-001-hybrid-trace-model.md
  - ADRs/ADR-002-compressed-graph-default.md
  - ADRs/ADR-003-preview-only-privacy-default.md
  - ADRs/ADR-004-import-plus-local-watch-scope.md
source_of_truth:
  product: tasks/codex-multi-agent-monitor-v0-1/PRD.md
  ux: tasks/codex-multi-agent-monitor-v0-1/UX_SPEC.md
  architecture: tasks/codex-multi-agent-monitor-v0-1/TECH_SPEC.md
  data_contract: tasks/codex-multi-agent-monitor-v0-1/schema.json
  acceptance: tasks/codex-multi-agent-monitor-v0-1/ACCEPTANCE.feature
  execution: tasks/codex-multi-agent-monitor-v0-1/EXECUTION_PLAN.md
