task: codex-multi-agent-monitor-v0-1
goal: >
  Codex 멀티 에이전트 run 하나를 열었을 때 30초 안에 생성된 agent, handoff,
  wait point, artifact, 종료 상태를 읽을 수 있는 디버깅 워크벤치 v0.1을 설계한다.
success_criteria:
  - 사용자가 단일 run 상세 화면에서 30초 안에 agent 수를 말할 수 있다.
  - 사용자가 현재 running, waiting, blocked, interrupted, done, failed 상태를 구분할 수 있다.
  - 사용자가 마지막 handoff의 source/target을 바로 확인할 수 있다.
  - 사용자가 가장 긴 hidden gap과 그 구간의 idle lane 수를 확인할 수 있다.
  - 사용자가 첫 실패 지점과 final artifact author를 확인할 수 있다.
  - import와 local watch가 동일한 normalized schema와 summary contract를 사용한다.
major_boundaries:
  - Run List와 Run Detail의 UI shell, lane interaction, inspector workflow
  - Project, Session, RunTrace, AgentLane, EventObservation, EdgeLink 기반 normalized event schema
  - completed run import와 local live tail/watch ingest adapter boundary
  - preview-only default, raw opt-in, export raw excluded 기본 정책을 포함한 privacy/export policy
work_type: feature
impact_flags:
  - ui_surface_changed
  - workflow_changed
  - architecture_significant
  - data_contract_changed
  - operability_changed
required_docs:
  - README.md
  - PRD.md
  - UX_SPEC.md
  - TECH_SPEC.md
  - schema.json
  - ACCEPTANCE.feature
  - EXECUTION_PLAN.md
