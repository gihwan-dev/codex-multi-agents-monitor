  screen_prefix: SCR
  flow_prefix: FLOW
  adr_prefix: ADR
  acceptance_prefix: AC
  slice_prefix: SLICE
  risk_prefix: RISK
delivery_strategy: ui-first
validation_gate: blocking
current_phase: design
quality_preflight:
  verdict: orchestrated-task
  reasoning: >
    현재 저장소는 Tauri desktop + React 최소 스캐폴드이며, 신규 UI surface, workflow,
    data contract, ingest boundary, privacy policy를 동시에 정의해야 하므로 long-running
    task bundle과 blocking validation gate가 필요하다.
assumptions:
  - 플랫폼은 Tauri desktop 우선이며 web 배포는 v0.1 범위 밖이다.
  - v0.1 수집 범위는 completed run import와 local live tail/watch까지다.
  - direct Codex runtime coupling은 후속 adapter 과제로 남기고 내부 모델은 vendor-agnostic으로 유지한다.
  - 문서는 한국어로 작성하되 enum, event type, field name, traceability ID는 영어를 유지한다.
