task: codex-multi-agent-monitoring-app
goal: >-
  Codex 멀티 에이전트 세션을 로컬에서 실시간/아카이브로 관찰하고,
  오케스트레이션 품질과 에이전트 효율을 설명 가능한 지표로 보여주는
  Tauri + React 데스크톱 앱을 구현한다.
success_criteria:
  - SCR-001, SCR-002, SCR-003이 같은 앱 셸 안에서 동작한다.
  - REQ-001, REQ-002, REQ-003, REQ-005, REQ-006, REQ-010이 구현되고 현재 로컬 Codex 로그에서 검증된다.
  - 라이브 세션 append 후 150ms 이내에 화면에 반영되는 경로가 준비된다.
  - 10,000+ normalized timeline events에서 zoom/pan과 detail drill-down이 usable 성능을 유지한다.
  - 모든 세션 데이터와 파생 지표가 로컬 파일/로컬 DB 안에서만 처리된다.
major_boundaries:
  - Rust backend ingestion, file watching, persistence
  - shared canonical event schema between Rust and React
  - React app shell, workspace navigation, live/archive/dashboard surfaces
  - vector timeline renderer with zoom, pan, level-of-detail filtering
  - analytics and heuristic layer for orchestration quality metrics
